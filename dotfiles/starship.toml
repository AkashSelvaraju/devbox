format = """
╭─$username@$hostname $directory $git_section $kubernetes $time
╰─➤
"""

add_newline = false

# Username
[username]
show_always = true
style_user = "bold green"
format = "[$user]($style)"

# Hostname
[hostname]
ssh_only = false
style = "bold green"
format = "[@$hostname]($style) "

# Directory
[directory]
style = "bold blue"
truncate_to_repo = false
format = "[$path]($style) "

# --------------------------
# Git section
# --------------------------

[git_branch]
symbol = ""
style = "bold purple"
format = "[$branch]($style)"

[git_status]
modified = "*"
format = "[$modified]($style)"

[git_state]
disabled = true

[git_commit]
disabled = true

# Custom wrapper to format repo|branch
[custom.git_section]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
command = """
repo=$(basename `git rev-parse --show-toplevel`)
branch=$(git branch --show-current)
dirty=$(git status --porcelain | wc -l)
if [ "$dirty" -gt 0 ]; then
    echo "[$repo|$branch*]"
else
    echo "[$repo|$branch]"
fi
"""
shell = ["bash", "--noprofile", "--norc"]
format = " $output "

# --------------------------
# Kubernetes
# --------------------------

[kubernetes]
disabled = false
format = "[[$context|$namespace]](bold cyan) "
detect_files = ["kubeconfig"]
detect_folders = []

# --------------------------
# Time
# --------------------------

[time]
disabled = false
time_format = "%H:%M:%S"
style = "bold yellow"
format = "[$time]($style)"
